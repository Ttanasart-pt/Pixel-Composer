<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PXC Documentation</title>

    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="./styles.css">
    <link rel="shortcut icon" type="image/x-icon" href="/src/favicon.ico">
</head>
<body>
    <div class = "header">
        <div class="header-title">
            <img src="/src/icon_48.png" alt="PXC Logo" class="logo">
            <a href="/index.html">
                <h2>PXC Documentation</h2>
            </a>
        </div>

        <a href="https://pixel-composer.com">PXC Home</a>
    </div>

    <div class="main">
        <div id="sidebar" class="sidebar">
            <div class="search">
                <form id="search_form" onsubmit="return false;">
                    <input type="search" name="search" placeholder="Search..." id="search" onkeyup="onSearch()" onchange="onSearch()">
                </form>
            </div>
            <ul>
                <div id="search_spacing" style="height: 48px;"></div>
                <div id="sidebar-nav">
                    {{sidebar}}
                </div>
                {{search_results}}
                <div style="height: 96px;"></div>
            </ul>
        </div>
        
        <div class="sidebar-toggle">
            <a href="javascript:void(0);" onclick="toggleSidebar()">
                <img src="/src/icons/hamburger_grey.png" alt="Search Icon" style="width: 24px; height: 24px; padding: 4px;">
            </a>
        </div>

        <div class="content">
            {{breadcrumbs}}
            {{content}}
        </div>
    </div>

    <div style="height: 96px;"></div>
    <div class="footer"> <p>2024 Pixel Composer</p> </div>
</body>

<script>
    function onSearch() {
        var input = document.getElementById('search').value
        var space = document.getElementById('search_spacing');
        var x     = document.getElementsByClassName('search-result');
        var cnt   = document.getElementById('sidebar-nav');
        input = input.toLowerCase();

        if (input == "") {
            for (i = 0; i < x.length; i++)
                x[i].style.display="none";

            cnt.style.display="block";
            return;
        }

        cnt.style.display="none";
        for (i = 0; i < x.length; i++) {
            if (!x[i].innerHTML.toLowerCase().includes(input))
                x[i].style.display="none";
            else
                x[i].style.display="flex";
        }
    }
    onSearch()

    let sideBar = document.getElementById('sidebar');

    function toggleSidebar() {
        if (sideBar.classList.contains('open')) {
            sideBar.classList.remove('open');
        } else {
            sideBar.classList.add('open');
        }
    }

    let toggles = document.getElementsByClassName('sidebar-dir');
    for (let i = 0; i < toggles.length; i++) {
        toggles[i].addEventListener('click', function() {
            let submenu = this.parentElement;
            if (submenu.classList.contains('open')) {
                submenu.classList.remove('open');
            } else {
                submenu.classList.add('open');
            }
        });
    }

    function sidebarNavigate() {
        let sidebarNav   = document.getElementById('sidebar-nav');
        let currentPath  = window.location.pathname.replace(".html", "");
        let pathSegments = currentPath.split('/').filter(segment => segment.length > 0);
        let navpointer   = sidebarNav;

        for(let i = 0; i < pathSegments.length; i++) {
            let segment = pathSegments[i];
            let found = false;

            for (let j = 0; j < navpointer.children.length; j++) {
                let child = navpointer.children[j];
                if (child.id === segment) {
                    let dir = child.querySelector('.sidebar-menu');
                    if (dir) {
                        dir.classList.add('open');
                        dir.classList.add('active');
                    }
                    
                    navpointer = child.querySelector('ul.submenu');
                    found = true;
                    // console.log(`Navigating to segment: ${segment}`);
                    break;
                }
            }

            if (!found) {
                console.warn(`Could not find sidebar entry for segment: ${segment}`);
                break;
            }
        }

        if(navpointer && navpointer != sidebarNav) { // scroll to active item
            // navpointer.scrollIntoView({ behavior: 'instant', block: 'center' });   
        }
    }

    sidebarNavigate();
</script>

</html>
